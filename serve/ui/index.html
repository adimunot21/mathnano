<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MathNano</title>
<script>
  window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']],
                            displayMath: [['$$', '$$'], ['\\[', '\\]']] } };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
  :root { --bg:#0f1117; --panel:#171a21; --me:#243b53; --bot:#1f2530; --accent:#5b9; --text:#e6e6e6; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text);
         display:flex; flex-direction:column; height:100vh; }
  header { padding:14px 20px; background:var(--panel); border-bottom:1px solid #2a2f3a;
           font-weight:600; letter-spacing:.3px; }
  header small { color:#8a93a3; font-weight:400; margin-left:8px; }
  #log { flex:1; overflow-y:auto; padding:20px; max-width:820px; width:100%; margin:0 auto; }
  .msg { padding:12px 16px; border-radius:10px; margin:10px 0; white-space:pre-wrap;
         line-height:1.5; }
  .me  { background:var(--me); margin-left:15%; }
  .bot { background:var(--bot); margin-right:15%; }
  .answer { margin-top:8px; color:var(--accent); font-weight:600; }
  form { display:flex; gap:10px; padding:16px 20px; background:var(--panel);
         border-top:1px solid #2a2f3a; max-width:820px; width:100%; margin:0 auto; }
  input { flex:1; padding:12px 14px; border-radius:8px; border:1px solid #2a2f3a;
          background:#0c0e13; color:var(--text); font-size:15px; }
  button { padding:12px 20px; border:0; border-radius:8px; background:var(--accent);
           color:#06231a; font-weight:700; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
</style>
</head>
<body>
  <header>MathNano <small>step-by-step math solver</small></header>
  <div id="log"></div>
  <form id="form">
    <input id="q" autocomplete="off" placeholder="Ask a math problem, e.g. If 5x - 3 = 12, what is 5x + 3?" />
    <button id="send" type="submit">Solve</button>
  </form>
<script>
const log = document.getElementById('log');
const form = document.getElementById('form');
const q = document.getElementById('q');
const send = document.getElementById('send');

function bubble(cls, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
  return d;
}
function typeset() { if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise(); }

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const problem = q.value.trim();
  if (!problem) return;
  bubble('me', problem);
  q.value = '';
  send.disabled = true;
  const bot = bubble('bot', '');
  try {
    // Stream the solution via SSE for a responsive feel.
    const res = await fetch('/chat/stream', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ messages: [{ role: 'user', content: problem }] })
    });
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      // parse SSE frames: lines "event: chunk" / "data: ..."
      const frames = buf.split('\n\n'); buf = frames.pop();
      for (const f of frames) {
        const m = f.match(/data: ?([\s\S]*)$/);
        if (m && !f.includes('event: done')) bot.textContent += m[1];
      }
      log.scrollTop = log.scrollHeight;
    }
    typeset();
  } catch (err) {
    bot.textContent = 'Error: ' + err;
  } finally {
    send.disabled = false;
    q.focus();
  }
});
</script>
</body>
</html>
