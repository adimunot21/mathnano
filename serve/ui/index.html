<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MathNano — math solver</title>
<script>
  window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']],
                            displayMath: [['$$', '$$'], ['\\[', '\\]']] },
                     options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] } };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
  :root{--bg:#0e1116;--panel:#161b22;--line:#283039;--me:#1f6feb;--bot:#1b2128;
        --accent:#3fb950;--text:#e6edf3;--muted:#8b949e;}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);
       color:var(--text);display:flex;flex-direction:column;height:100vh}
  header{padding:14px 20px;background:var(--panel);border-bottom:1px solid var(--line)}
  header b{font-size:17px} header span{color:var(--muted);font-size:13px;margin-left:8px}
  #model{float:right;color:var(--muted);font-size:12px;margin-top:4px}
  #log{flex:1;overflow-y:auto;padding:22px;max-width:860px;width:100%;margin:0 auto}
  .msg{padding:13px 16px;border-radius:12px;margin:12px 0;line-height:1.55;white-space:pre-wrap;
       word-wrap:break-word}
  .me{background:var(--me);margin-left:18%;color:#fff}
  .bot{background:var(--bot);margin-right:8%;border:1px solid var(--line)}
  .answer{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);
          color:var(--accent);font-weight:700;font-size:15px}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--line);
           border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;
           vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ex{max-width:860px;margin:0 auto;padding:0 22px 8px;display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:var(--panel);border:1px solid var(--line);color:var(--muted);
        padding:7px 12px;border-radius:18px;font-size:13px;cursor:pointer}
  .chip:hover{color:var(--text);border-color:var(--accent)}
  form{display:flex;gap:10px;padding:14px 22px;background:var(--panel);
       border-top:1px solid var(--line);max-width:860px;width:100%;margin:0 auto}
  input{flex:1;padding:12px 14px;border-radius:10px;border:1px solid var(--line);
        background:#0b0e13;color:var(--text);font-size:15px}
  button{padding:12px 22px;border:0;border-radius:10px;background:var(--accent);color:#04260f;
         font-weight:700;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
</style>
</head>
<body>
  <header><b>MathNano</b><span>step-by-step math solver · Qwen2.5-1.5B + SFT</span>
    <span id="model"></span></header>
  <div id="log">
    <div class="msg bot">Ask me a math problem — algebra, arithmetic, word problems, or
      competition-style questions. I'll show my working and box the final answer.</div>
  </div>
  <div class="ex" id="examples"></div>
  <form id="form">
    <input id="q" autocomplete="off" placeholder="e.g. If 5x - 3 = 12, what is 5x + 3?" />
    <button id="send" type="submit">Solve</button>
  </form>
<script>
const log=document.getElementById('log'), form=document.getElementById('form'),
      q=document.getElementById('q'), send=document.getElementById('send'),
      examples=document.getElementById('examples');

const EXAMPLES=[
  "If 5x - 3 = 12, what is the value of 5x + 3?",
  "A train travels 60 km/h for 2.5 hours. How far does it go?",
  "What is the greatest common divisor of 48 and 60?",
  "Solve for x: x^2 - 5x + 6 = 0",
];
EXAMPLES.forEach(t=>{const c=document.createElement('div');c.className='chip';c.textContent=t;
  c.onclick=()=>{q.value=t;form.requestSubmit();};examples.appendChild(c);});

fetch('/health').then(r=>r.json()).then(d=>{document.getElementById('model').textContent=d.model;})
  .catch(()=>{});

function bubble(cls,html){const d=document.createElement('div');d.className='msg '+cls;
  d.innerHTML=html;log.appendChild(d);log.scrollTop=log.scrollHeight;return d;}
function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

form.addEventListener('submit',async e=>{
  e.preventDefault();
  const problem=q.value.trim(); if(!problem) return;
  bubble('me',esc(problem)); q.value=''; send.disabled=true;
  const bot=bubble('bot','<span class="spinner"></span>Solving… (CPU, ~5–30s)');
  try{
    const res=await fetch('/solve',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({problem})});
    const data=await res.json();
    let html=esc(data.solution||'(no solution)');
    if(data.answer) html+=`<div class="answer">Answer: ${esc(data.answer)}</div>`;
    bot.innerHTML=html;
    if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([bot]);
  }catch(err){bot.innerHTML='Error: '+esc(String(err));}
  finally{send.disabled=false;q.focus();log.scrollTop=log.scrollHeight;}
});
</script>
</body>
</html>
